name: Release macOS App (Staging)

on:
  push:
    branches:
      - staging
    paths:
      - package.json
      - src-tauri/tauri.conf.json
  workflow_dispatch:

concurrency:
  group: macos-release-staging-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: macOS Apple Silicon (Staging)
    runs-on: macos-latest
    timeout-minutes: 45

    env:
      HEADROOM_UPDATER_ENDPOINTS: '["https://github.com/tarunag10/mac-ai-switchboard/releases/latest/download/latest.json"]'
      HEADROOM_UPDATER_STAGING_ENDPOINTS: '["https://github.com/tarunag10/mac-ai-switchboard/releases/download/staging-rolling/latest.json"]'
      HEADROOM_UPDATER_PUBLIC_KEY: ${{ vars.HEADROOM_UPDATER_PUBLIC_KEY }}
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_PRIVATE_KEY_P8: ${{ secrets.APPLE_API_PRIVATE_KEY_P8 }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      HEADROOM_ACCOUNT_API_BASE_URL: ${{ vars.HEADROOM_ACCOUNT_API_BASE_URL }}
      HEADROOM_APTABASE_APP_KEY: ${{ vars.HEADROOM_APTABASE_APP_KEY }}
      VITE_HEADROOM_SALES_CONTACT_URL: ${{ vars.VITE_HEADROOM_SALES_CONTACT_URL }}
      VITE_HEADROOM_CONTACT_FORM_URL: ${{ vars.VITE_HEADROOM_CONTACT_FORM_URL }}
      VITE_CLARITY_PROJECT_ID: ${{ vars.VITE_CLARITY_PROJECT_ID }}
      HEADROOM_SENTRY_DSN: ${{ secrets.HEADROOM_SENTRY_DSN }}
      VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target
          env-vars: HEADROOM_SENTRY_DSN

      - name: Validate staging version state
        id: release_guard
        shell: bash
        run: |
          set -euo pipefail
          package_version="$(node -p "require('./package.json').version")"
          tauri_version="$(node -p "JSON.parse(require('fs').readFileSync('./src-tauri/tauri.conf.json', 'utf8')).version")"
          should_release=true

          if [[ "$package_version" != "$tauri_version" ]]; then
            echo "package.json version ($package_version) does not match src-tauri/tauri.conf.json version ($tauri_version)." >&2
            exit 1
          fi

          if [[ ! "$package_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$ ]]; then
            echo "Staging requires an -rc.N pre-release version (got: $package_version)." >&2
            exit 1
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            before_sha="${{ github.event.before }}"
            if [[ -n "${before_sha}" ]] && [[ "${before_sha}" != "0000000000000000000000000000000000000000" ]] && git cat-file -e "${before_sha}^{commit}" 2>/dev/null; then
              previous_package_version="$(
                git show "${before_sha}:package.json" \
                  | node -e "const fs = require('fs'); console.log(JSON.parse(fs.readFileSync(0, 'utf8')).version);"
              )"
              previous_tauri_version="$(
                git show "${before_sha}:src-tauri/tauri.conf.json" \
                  | node -e "const fs = require('fs'); console.log(JSON.parse(fs.readFileSync(0, 'utf8')).version);"
              )"

              if [[ "${previous_package_version}" == "${package_version}" ]] && [[ "${previous_tauri_version}" == "${tauri_version}" ]]; then
                should_release=false
                echo "No app version bump detected relative to ${before_sha}; skipping release."
              fi
            fi
          fi

          echo "package_version=${package_version}" >> "$GITHUB_OUTPUT"
          echo "should_release=${should_release}" >> "$GITHUB_OUTPUT"

      - name: Validate release configuration
        if: steps.release_guard.outputs.should_release == 'true'
        shell: bash
        run: |
          set -euo pipefail

          required=(
            HEADROOM_ACCOUNT_API_BASE_URL
            HEADROOM_APTABASE_APP_KEY
            HEADROOM_UPDATER_PUBLIC_KEY
            APPLE_CERTIFICATE
            APPLE_CERTIFICATE_PASSWORD
            APPLE_SIGNING_IDENTITY
            TAURI_SIGNING_PRIVATE_KEY
            TAURI_SIGNING_PRIVATE_KEY_PASSWORD
            HEADROOM_SENTRY_DSN
            VITE_SENTRY_DSN
          )

          for key in "${required[@]}"; do
            if [[ -z "${!key:-}" ]]; then
              echo "Missing required secret or variable: $key" >&2
              exit 1
            fi
          done

          if [[ -n "${APPLE_API_ISSUER:-}" && -n "${APPLE_API_KEY:-}" && -n "${APPLE_API_PRIVATE_KEY_P8:-}" ]]; then
            exit 0
          fi

          if [[ -n "${APPLE_ID:-}" && -n "${APPLE_PASSWORD:-}" && -n "${APPLE_TEAM_ID:-}" ]]; then
            exit 0
          fi

          echo "Configure either App Store Connect notarization secrets or Apple ID notarization secrets." >&2
          exit 1

      - name: Prepare App Store Connect API key
        if: steps.release_guard.outputs.should_release == 'true' && env.APPLE_API_PRIVATE_KEY_P8 != ''
        shell: bash
        run: |
          set -euo pipefail
          key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
          printf '%s' "$APPLE_API_PRIVATE_KEY_P8" > "$key_path"
          echo "APPLE_API_KEY_PATH=$key_path" >> "$GITHUB_ENV"

      - name: Install frontend dependencies
        if: steps.release_guard.outputs.should_release == 'true'
        run: npm ci

      - name: Run release checks
        if: steps.release_guard.outputs.should_release == 'true'
        timeout-minutes: 12
        run: ./scripts/verify-release.sh

      - name: Build and publish versioned rc release
        if: steps.release_guard.outputs.should_release == 'true'
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEADROOM_UPDATER_ENDPOINTS: ${{ env.HEADROOM_UPDATER_ENDPOINTS }}
          HEADROOM_UPDATER_STAGING_ENDPOINTS: ${{ env.HEADROOM_UPDATER_STAGING_ENDPOINTS }}
          HEADROOM_UPDATER_PUBLIC_KEY: ${{ env.HEADROOM_UPDATER_PUBLIC_KEY }}
          APPLE_CERTIFICATE: ${{ env.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ env.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ env.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ env.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
          APPLE_TEAM_ID: ${{ env.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ env.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          HEADROOM_SENTRY_DSN: ${{ env.HEADROOM_SENTRY_DSN }}
          VITE_SENTRY_DSN: ${{ env.VITE_SENTRY_DSN }}
        with:
          projectPath: .
          tagName: v__VERSION__
          releaseName: Mac AI Switchboard v__VERSION__ (staging)
          releaseBody: |
            Staging (release candidate) build. Not for general distribution.
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: true
          assetNamePattern: '[name]_[version]_mac[ext]'
          includeUpdaterJson: true
          args: --target aarch64-apple-darwin

      - name: Mirror artifacts to rolling staging release
        if: steps.release_guard.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RC_TAG: v${{ steps.release_guard.outputs.package_version }}
        shell: bash
        run: |
          set -euo pipefail
          workdir="$(mktemp -d)"
          gh release download "$RC_TAG" --repo "$GITHUB_REPOSITORY" --dir "$workdir"

          # Point the staging-rolling tag at this build's commit (create or force-move).
          if gh api "repos/${GITHUB_REPOSITORY}/git/refs/tags/staging-rolling" >/dev/null 2>&1; then
            gh api --method PATCH "repos/${GITHUB_REPOSITORY}/git/refs/tags/staging-rolling" \
              -f sha="${GITHUB_SHA}" -F force=true >/dev/null
          else
            gh api --method POST "repos/${GITHUB_REPOSITORY}/git/refs" \
              -f ref="refs/tags/staging-rolling" -f sha="${GITHUB_SHA}" >/dev/null
          fi

          # Ensure the rolling release exists and refresh its notes.
          if gh release view staging-rolling --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            existing_assets="$(gh release view staging-rolling --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name')"
            gh release edit staging-rolling \
              --repo "$GITHUB_REPOSITORY" \
              --notes "Rolling pointer to the latest rc build. Current: $RC_TAG"
          else
            existing_assets=""
            gh release create staging-rolling \
              --repo "$GITHUB_REPOSITORY" \
              --title "Mac AI Switchboard staging (rolling)" \
              --notes "Rolling pointer to the latest rc build. Current: $RC_TAG" \
              --prerelease
          fi

          # Upload fresh artifacts. latest.json goes last so updaters never see
          # a pointer referencing an asset that hasn't finished uploading.
          shopt -s nullglob
          for asset in "$workdir"/*; do
            name="$(basename "$asset")"
            if [[ "$name" == "latest.json" ]]; then
              continue
            fi
            gh release upload staging-rolling "$asset" --clobber --repo "$GITHUB_REPOSITORY"
          done
          if [[ -f "$workdir/latest.json" ]]; then
            gh release upload staging-rolling "$workdir/latest.json" --clobber --repo "$GITHUB_REPOSITORY"
          fi

          # Prune assets left over from previous rc versions.
          new_assets="$(cd "$workdir" && ls)"
          while IFS= read -r old; do
            [[ -z "$old" ]] && continue
            if ! printf '%s\n' "$new_assets" | grep -Fxq "$old"; then
              gh release delete-asset staging-rolling "$old" --yes --repo "$GITHUB_REPOSITORY" || true
            fi
          done <<< "$existing_assets"

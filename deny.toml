[advisories]
version = 2
yanked = "deny"
# These are transitive advisories from the pinned Tauri 2.10 desktop graph.
# No compatible safe upgrade is available without moving the Tauri/webview
# stack. Keep each exception explicit so new vulnerability advisories still
# fail the release gate.
ignore = [
  { id = "RUSTSEC-2024-0413", reason = "Transitive GTK3 binding required by the pinned Tauri webview graph; no compatible safe upgrade is available." },
  { id = "RUSTSEC-2024-0416", reason = "Transitive GTK3 binding required by the pinned Tauri webview graph; no compatible safe upgrade is available." },

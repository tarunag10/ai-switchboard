  { id = "RUSTSEC-2024-0415", reason = "Transitive GTK3 binding required by the pinned Tauri webview graph; no compatible safe upgrade is available." },
  { id = "RUSTSEC-2024-0420", reason = "Transitive GTK3 binding required by the pinned Tauri webview graph; no compatible safe upgrade is available." },
